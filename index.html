<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#F0F4F8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ALMACEN">
<title>Almacén Farmacia — HM La Portada</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F0F4F8;
    --surface: #FFFFFF;
    --surface2: #F7F9FC;
    --border: #D8E0EA;
    --accent: #1A6BCC;
    --text: #111827;
    --text2: #374151;
    --text3: #6B7280;
    --red: #CC1F1F;
    --red-bg: #FEF2F2;
    --red-border: #FECACA;
    --red-bar: #EF4444;
    --yellow: #B45309;
    --yellow-bg: #FFFBEB;
    --yellow-border: #FDE68A;
    --yellow-bar: #F59E0B;
    --green: #15803D;
    --green-bg: #F0FDF4;
    --green-border: #BBF7D0;
    --green-bar: #22C55E;
    --gray: #6B7280;
    --gray-bg: #F9FAFB;
    --gray-border: #E5E7EB;
    --gray-bar: #9CA3AF;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 4px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.10);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Nunito',Arial,sans-serif; }

  /* Números siempre con fuente clásica sin cero rayado */
  .num { font-family: Arial, Helvetica, sans-serif; }

  /* ── AUTH LOADING ── */
  #authLoading { position:fixed; inset:0; z-index:999; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
  #authLoading.hidden { display:none; }

  /* ── LOGIN ── */
  #loginScreen { position:fixed; inset:0; z-index:1000; background:#F0F4F8; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:28px 20px; overflow-y:auto; }
  #loginScreen.hidden { display:none; }
  .login-logo { width:90px; height:90px; margin-bottom:16px; border-radius:20px; overflow:hidden; box-shadow:var(--shadow-md); }
  .login-logo img { width:100%; height:100%; object-fit:contain; background:#fff; }
  .login-title { font-size:24px; font-weight:800; color:var(--text); text-align:center; margin-bottom:4px; }
  .login-sub { font-size:13px; color:var(--text3); text-align:center; line-height:1.6; margin-bottom:28px; }
  .login-box { width:100%; max-width:360px; background:#fff; border:1px solid var(--border); border-radius:16px; padding:24px; box-shadow:var(--shadow-md); }
  .login-label { font-size:12px; color:var(--text2); font-weight:700; margin-bottom:6px; display:block; }
  .login-field { margin-bottom:16px; }
  .login-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; color:var(--text); font-size:15px; font-family:'Nunito',Arial,sans-serif; outline:none; transition:border-color .2s; }
  .login-input:focus { border-color:var(--accent); }
  .login-btn { width:100%; background:var(--accent); color:#fff; border:none; border-radius:var(--radius-sm); padding:13px; font-size:15px; font-weight:700; font-family:'Nunito',Arial,sans-serif; cursor:pointer; margin-top:4px; transition:opacity .2s; box-shadow:0 4px 12px rgba(26,107,204,0.3); }
  .login-btn:active { opacity:0.88; }
  .login-btn:disabled { opacity:0.5; cursor:not-allowed; }
  .login-error { color:var(--red); font-size:12px; text-align:center; margin-top:10px; min-height:16px; }
  .login-footer { font-size:11px; color:var(--text3); text-align:center; margin-top:20px; }

  /* ── MAIN APP ── */
  #mainApp { display:none; flex-direction:column; height:100%; }
  #mainApp.visible { display:flex; }

  /* USER BAR */
  .user-bar { display:flex; align-items:center; gap:8px; padding:5px 14px; background:#fff; border-bottom:1px solid var(--border); font-size:11px; color:var(--text3); }
  .user-dot { width:7px; height:7px; border-radius:50%; background:var(--green-bar); flex-shrink:0; }
  .user-email { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text2); font-weight:600; }
  .logout-btn { background:none; border:1px solid var(--border); color:var(--text3); border-radius:6px; padding:3px 10px; font-size:11px; cursor:pointer; font-family:'Nunito',Arial,sans-serif; flex-shrink:0; }

  /* HEADER */
  #header { background:#fff; border-bottom:1px solid var(--border); padding:10px 14px 0; flex-shrink:0; box-shadow:var(--shadow); }
  .header-top { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .app-logo { width:46px; height:46px; flex-shrink:0; border-radius:12px; overflow:hidden; box-shadow:var(--shadow); }
  .app-logo img { width:100%; height:100%; object-fit:contain; background:#fff; }
  .header-titles { flex:1; min-width:0; }
  .app-title { font-size:16px; font-weight:800; color:var(--text); letter-spacing:-0.2px; line-height:1.2; }
  .app-subtitle { font-size:10px; color:var(--text3); line-height:1.4; }
  .app-creator { font-size:9px; color:#9CA3AF; }
  .header-right { text-align:right; flex-shrink:0; }
  .update-time { font-size:10px; color:var(--text3); font-family:Arial,sans-serif; }

  /* SEARCH */
  .search-wrap { position:relative; margin-bottom:10px; }
  .search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text3); pointer-events:none; }
  #searchInput { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius); padding:10px 36px 10px 38px; color:var(--text); font-size:15px; font-family:'Nunito',Arial,sans-serif; outline:none; transition:border-color .2s; }
  #searchInput:focus { border-color:var(--accent); }
  #searchInput::placeholder { color:#9CA3AF; }
  .clear-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--text3); cursor:pointer; display:none; font-size:16px; }

  /* TABS */
  .tabs-wrap { display:flex; gap:6px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
  .tabs-wrap::-webkit-scrollbar { display:none; }
  .tab { flex-shrink:0; padding:6px 13px; border-radius:20px; font-size:12px; font-weight:700; cursor:pointer; border:1px solid var(--border); background:var(--surface2); color:var(--text2); transition:all .2s; font-family:'Nunito',Arial,sans-serif; }
  .tab.active { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 2px 8px rgba(26,107,204,0.3); }
  .tab.t-red.active { background:var(--red); border-color:var(--red); color:#fff; }
  .tab.t-yellow.active { background:#D97706; border-color:#D97706; color:#fff; }
  .tab.t-green.active { background:var(--green); border-color:var(--green); color:#fff; }

  /* STATS */
  #statsBar { display:flex; gap:7px; padding:8px 14px; background:var(--bg); border-bottom:1px solid var(--border); overflow-x:auto; scrollbar-width:none; flex-shrink:0; }
  #statsBar::-webkit-scrollbar { display:none; }
  .stat-pill { display:flex; align-items:center; gap:5px; background:#fff; border-radius:20px; padding:5px 11px; font-size:11px; flex-shrink:0; border:1px solid var(--border); box-shadow:var(--shadow); }
  .stat-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .stat-pill strong { color:var(--text); font-family:Arial,sans-serif; }
  .stat-pill span { color:var(--text3); }

  /* LIST */
  #listWrap { overflow-y:auto; flex:1; padding:8px 12px 80px; }
  #listWrap::-webkit-scrollbar { width:3px; }
  #listWrap::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  /* LOTE CARD */
  .lote-card { background:#fff; border:1px solid var(--border); border-radius:var(--radius); margin-bottom:8px; overflow:hidden; cursor:pointer; transition:box-shadow .2s, transform .1s; position:relative; box-shadow:var(--shadow); }
  .lote-card:active { transform:scale(0.99); }
  .lote-card.expanded { border-color:var(--accent); box-shadow:var(--shadow-md); }

  .lc-bar { position:absolute; left:0; top:0; bottom:0; width:5px; border-radius:12px 0 0 12px; }
  .lc-bar-red { background:var(--red-bar); }
  .lc-bar-yellow { background:var(--yellow-bar); }
  .lc-bar-green { background:var(--green-bar); }
  .lc-bar-gray { background:var(--gray-bar); }

  .lc-main { padding:11px 11px 11px 18px; display:flex; align-items:center; gap:10px; }
  .lc-info { flex:1; min-width:0; }
  .lc-name { font-size:14px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
  .lc-meta { font-size:12px; color:var(--text2); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .lc-lote { font-size:12px; color:var(--text); font-weight:600; margin-top:3px; font-family:Arial,sans-serif; }

  .lc-right { text-align:right; flex-shrink:0; display:flex; flex-direction:column; align-items:flex-end; gap:3px; }

  .fecha-badge { font-size:12px; font-weight:700; font-family:Arial,Helvetica,sans-serif; padding:3px 9px; border-radius:7px; }
  .fb-red { background:var(--red-bg); color:var(--red); border:1px solid var(--red-border); }
  .fb-yellow { background:var(--yellow-bg); color:var(--yellow); border:1px solid var(--yellow-border); }
  .fb-green { background:var(--green-bg); color:var(--green); border:1px solid var(--green-border); }
  .fb-gray { background:var(--gray-bg); color:var(--gray); border:1px solid var(--gray-border); }

  .lc-stock { font-size:18px; font-weight:800; color:var(--text); font-family:Arial,Helvetica,sans-serif; line-height:1.1; }
  .lc-stock-label { font-size:9px; color:var(--text3); font-weight:600; text-transform:uppercase; letter-spacing:0.5px; }

  .chevron { width:18px; height:18px; color:var(--text3); transition:transform .25s; flex-shrink:0; }
  .lote-card.expanded .chevron { transform:rotate(180deg); }

  /* DETAIL PANEL */
  .detail-panel { display:none; border-top:1px solid var(--border); padding:12px 16px 14px; background:var(--surface2); }
  .lote-card.expanded .detail-panel { display:block; }
  .detail-title { font-size:11px; font-weight:700; letter-spacing:0.8px; color:var(--text3); text-transform:uppercase; margin-bottom:10px; }

  .detail-lote-row { display:flex; align-items:center; gap:8px; padding:9px 11px; background:#fff; border-radius:var(--radius-sm); margin-bottom:6px; border:1px solid var(--border); }
  .dl-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .dl-info { flex:1; min-width:0; }
  .dl-lote { font-size:13px; font-family:Arial,Helvetica,sans-serif; color:var(--text); font-weight:700; }
  .dl-fecha { font-size:12px; color:var(--text2); font-family:Arial,Helvetica,sans-serif; font-weight:600; }
  .dl-stock { font-size:16px; font-weight:800; font-family:Arial,Helvetica,sans-serif; color:var(--text); }

  .detail-total { display:flex; align-items:center; justify-content:space-between; background:var(--accent); border-radius:var(--radius-sm); padding:10px 14px; margin-top:8px; }
  .detail-total span:first-child { font-size:12px; color:#fff; font-weight:700; letter-spacing:0.5px; }
  .detail-total span:last-child { font-size:22px; font-weight:800; color:#fff; font-family:Arial,Helvetica,sans-serif; }

  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top:10px; }
  .dg-cell { background:#fff; border-radius:8px; padding:8px 10px; border:1px solid var(--border); }
  .dg-label { font-size:9px; color:var(--text3); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:3px; font-weight:700; }
  .dg-value { font-size:12px; color:var(--text); font-weight:600; }

  /* EMPTY */
  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; height:220px; color:var(--text3); text-align:center; gap:12px; }
  .empty-state .eicon { font-size:44px; }
  .empty-state p { font-size:13px; font-weight:600; }

  /* SPINNER */
  .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .load-center { display:flex; flex-direction:column; align-items:center; justify-content:center; height:200px; gap:14px; color:var(--text3); font-size:13px; font-weight:600; }

  @media(min-width:600px) {
    #listWrap { max-width:720px; margin:0 auto; width:100%; }
    #statsBar { justify-content:center; }
  }
</style>
</head>
<body>

<!-- AUTH LOADING -->
<div id="authLoading">
  <div class="spinner"></div>
  <span style="font-size:13px;color:#6B7280;font-weight:600">Verificando sesión...</span>
</div>

<!-- LOGIN -->
<div id="loginScreen" class="hidden">
  <div class="login-logo">
    <img src="icon-512.png" alt="logo" onerror="this.src='';this.parentElement.textContent='🏥'">
  </div>
  <div class="login-title">Almacén de Farmacia</div>
  <div class="login-sub">Hospital Municipal La Portada<br>Control de Vencimientos y Stock</div>
  <div class="login-box">
    <div class="login-field">
      <label class="login-label">Correo electrónico</label>
      <input class="login-input" type="email" id="loginEmail" placeholder="usuario@gmail.com" autocomplete="email">
    </div>
    <div class="login-field">
      <label class="login-label">Contraseña</label>

</div>

<!-- MAIN APP -->
<div id="mainApp">
  <div class="user-bar">
    <div class="user-dot"></div>
    <span class="user-email" id="userEmail">—</span>
    <button class="logout-btn" id="logoutBtn">Cerrar sesión</button>
  </div>

  <div id="header">
    <div class="header-top">
      <div class="app-logo">
        <img src="icon-192.png" alt="logo" onerror="this.parentElement.textContent='🏥'">
      </div>
      <div class="header-titles">
        <div class="app-title">ALMACEN FARMACIA</div>
        <div class="app-subtitle">Hospital Municipal La Portada</div>
        <div class="app-creator">Creado por: Marcelo Oviedo L.</div>
      </div>

        <div class="update-time" id="updateTime">—</div>
        <div class="update-time" id="totalMeds" style="margin-top:2px"></div>
      </div>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Buscar medicamento..." autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="clear-btn" id="clearBtn">✕</button>
    </div>
    <div class="tabs-wrap" id="tabsWrap">
      <button class="tab active" data-tab="all">Todos</button>
      <button class="tab" data-tab="AC">A – C</button>
      <button class="tab" data-tab="DH">D – H</button>
      <button class="tab" data-tab="IO">I – O</button>
      <button class="tab" data-tab="PZ">P – Z</button>
      <button class="tab t-red" data-tab="red">🔴 Urgente</button>

  <div id="statsBar">
    <div class="stat-pill"><div class="stat-dot" style="background:var(--red-bar)"></div><strong id="cRed">-</strong><span>&nbsp;≤6m</span></div>
    <div class="stat-pill"><div class="stat-dot" style="background:var(--yellow-bar)"></div><strong id="cYellow">-</strong><span>&nbsp;6-12m</span></div>
    <div class="stat-pill"><div class="stat-dot" style="background:var(--green-bar)"></div><strong id="cGreen">-</strong><span>&nbsp;&gt;12m</span></div>
    <div class="stat-pill"><div class="stat-dot" style="background:var(--gray-bar)"></div><strong id="cGray">-</strong><span>&nbsp;s/stock</span></div>
  </div>

  <div id="listWrap">
    <div class="load-center"><div class="spinner"></div><span>Cargando inventario...</span></div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyBWxJEaTZbrKj_NZIxSsLC2CDuSuu-UHq4",
  authDomain: "almacen-d526b.firebaseapp.com",
  projectId: "almacen-d526b",
  storageBucket: "almacen-d526b.firebasestorage.app",
  messagingSenderId: "781156379872",
  appId: "1:781156379872:web:4ada47ede9527ab5189485"
};
const auth = getAuth(initializeApp(firebaseConfig));
const $ = id => document.getElementById(id);

// ── AUTH STATE ──
onAuthStateChanged(auth, user => {
  $('authLoading').classList.add('hidden');
  if (user) {
    $('loginScreen').classList.add('hidden');
    $('mainApp').classList.add('visible');
    $('userEmail').textContent = user.email;
    loadData();
  } else {
    $('mainApp').classList.remove('visible');
    $('loginScreen').classList.remove('hidden');
  }
});

// ── LOGIN ──
$('loginBtn').addEventListener('click', async () => {
  const email = $('loginEmail').value.trim();
  const pass  = $('loginPassword').value;
  if (!email || !pass) { $('loginError').textContent = 'Ingresá tu correo y contraseña.'; return; }
  $('loginBtn').disabled = true;
  $('loginBtn').textContent = 'Ingresando...';
  $('loginError').textContent = '';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (err) {
    const msgs = {
      'auth/invalid-credential': 'Correo o contraseña incorrectos.',
      'auth/user-not-found':     'Correo no registrado.',
      'auth/wrong-password':     'Contraseña incorrecta.',
      'auth/too-many-requests':  'Demasiados intentos. Esperá unos minutos.'
    };
    $('loginError').textContent = msgs[err.code] || 'Error al ingresar.';
    $('loginBtn').disabled = false;
    $('loginBtn').textContent = 'Ingresar al Sistema';
  }
});
[$('loginEmail'), $('loginPassword')].forEach(el =>
  el.addEventListener('keydown', e => { if (e.key === 'Enter') $('loginBtn').click(); })
);
$('logoutBtn').addEventListener('click', () => signOut(auth));

// ══════════════════════════════════════
// ── INVENTARIO ──
// ══════════════════════════════════════
let allData = [], byCode = {};
let currentTab = 'all', searchQuery = '';

const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

function color(f) {
  if (!f) return 'gray';
  const m = (new Date(f) - Date.now()) / (1000*60*60*24*30.44);
  return m < 0 ? 'red' : m <= 6 ? 'red' : m <= 12 ? 'yellow' : 'green';
}

function fmt(f) {
  if (!f) return 'Sin fecha';
  const [y, mo] = f.split('-');
  return MESES[+mo-1] + ' ' + y;
}

function dotClr(c) {
  return c==='red' ? 'var(--red-bar)' : c==='yellow' ? 'var(--yellow-bar)' : c==='green' ? 'var(--green-bar)' : 'var(--gray-bar)';
}

function buildByCode(data) {
  const map = {};
  for (const r of data) {
    if (!map[r.codigo]) map[r.codigo] = {
      medicamento: r.medicamento, forma_farmaceutica: r.forma_farmaceutica,
      concentracion: r.concentracion, proveedor: r.proveedor,
      porcentaje_cambio: r.porcentaje_cambio, tiempo_devolucion: r.tiempo_devolucion,
      año_adquisicion: r.año_adquisicion, tipo_proceso: r.tipo_proceso,
      lotes: [], total_global: 0
    };
    if (r.lote || r.fecha_vencimiento)
      map[r.codigo].lotes.push({ lote: r.lote, fecha: r.fecha_vencimiento, stock: r.total_por_lote||0 });
    map[r.codigo].total_global += r.total_por_lote||0;
  }
  return map;
}

function filterRows() {
  let rows = [...allData];
  const ranges = { AC:['A','C'], DH:['D','H'], IO:['I','O'], PZ:['P','Z'] };

  if (ranges[currentTab]) {
    const [f, t] = ranges[currentTab];
    rows = rows.filter(r => { const l = r.medicamento[0].toUpperCase(); return l >= f && l <= t; });
  } else if (['red','yellow','green'].includes(currentTab)) {
    rows = rows.filter(r => color(r.fecha_vencimiento) === currentTab);
  }

  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    rows = rows.filter(r =>
      r.medicamento.toLowerCase().includes(q) ||
      r.codigo.toLowerCase().includes(q) ||
      (r.forma_farmaceutica && r.forma_farmaceutica.toLowerCase().includes(q)) ||
      (r.concentracion && r.concentracion.toLowerCase().includes(q))
    );
  }

  // ── ORDENAMIENTO POR PESTAÑA ──
  const byFecha = (a, b) => {
    const fa = a.fecha_vencimiento, fb = b.fecha_vencimiento;
    if (fa && fb) return new Date(fa) - new Date(fb);
    if (fa) return -1;
    if (fb) return 1;
    return 0;
  };
  const byAlfa = (a, b) => a.medicamento.localeCompare(b.medicamento, 'es');

  if (currentTab === 'all') {
    // TODOS: fecha ascendente pura (más próximo primero)
    rows.sort((a, b) => byFecha(a, b) || byAlfa(a, b));
  } else if (ranges[currentTab]) {
    // A-C / D-H / I-O / P-Z: alfabético puro
    rows.sort(byAlfa);
  } else {
    // Urgente / Próximos / OK: fecha ascendente
    rows.sort((a, b) => byFecha(a, b) || byAlfa(a, b));
  }

  return rows;
}

function renderStats() {
  const c = { red:0, yellow:0, green:0, gray:0 };
  for (const r of allData) c[color(r.fecha_vencimiento)]++;
  $('cRed').textContent = c.red; $('cYellow').textContent = c.yellow;
  $('cGreen').textContent = c.green; $('cGray').textContent = c.gray;
}

function renderList() {
  const rows = filterRows();
  const wrap = $('listWrap');
  if (!rows.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="eicon">🔍</div><p>No se encontraron medicamentos</p></div>`;
    return;
  }

  let html = '';
  for (const r of rows) {
    const c = color(r.fecha_vencimiento);
    const info = byCode[r.codigo];

    // Lotes del mismo medicamento
    let lotesHtml = '';
    if (info && info.lotes.length) {
      const sorted = [...info.lotes].sort((a, b) => {
        if (a.fecha && b.fecha) return new Date(a.fecha) - new Date(b.fecha);
        return a.fecha ? -1 : 1;
      });
      for (const l of sorted) {
        const lc = color(l.fecha);
        lotesHtml += `<div class="detail-lote-row">
          <div class="dl-dot" style="background:${dotClr(lc)}"></div>
          <div class="dl-info">
            <div class="dl-lote">Lote: ${l.lote || 'N/A'}</div>
            <div class="dl-fecha">${fmt(l.fecha)}</div>
          </div>
          <div class="dl-stock">${l.stock.toLocaleString('es')}</div>
        </div>`;
      }
    } else {
      lotesHtml = `<div style="font-size:12px;color:var(--text3);font-style:italic;padding:6px 0">Sin lotes registrados</div>`;
    }

    // Info extra
    const extras = [
      ['Código', r.codigo], ['Proveedor', r.proveedor],
      ['% Cambio/Dev.', r.porcentaje_cambio], ['Tiempo Dev.', r.tiempo_devolucion],
      ['Año Adquisición', r.año_adquisicion], ['Tipo Proceso', r.tipo_proceso]
    ].filter(([, v]) => v && v !== 'nan' && v !== 'null' && v !== 'None');

    const gridHtml = extras.length
      ? `<div class="detail-grid">${extras.map(([l, v]) =>
          `<div class="dg-cell"><div class="dg-label">${l}</div><div class="dg-value">${v}</div></div>`
        ).join('')}</div>`
      : '';

    const totalGlobal = info ? info.total_global : (r.total_por_lote || 0);
    const loteTexto = r.lote ? 'Lote: ' + r.lote : 'Sin lote';

    html += `<div class="lote-card">
      <div class="lc-bar lc-bar-${c}"></div>
      <div class="lc-main">
        <div class="lc-info">
          <div class="lc-name">${r.medicamento}</div>
          <div class="lc-meta">${r.forma_farmaceutica || '—'} · ${r.concentracion || '—'}</div>
          <div class="lc-lote">${loteTexto}</div>
        </div>
        <div class="lc-right">
          <span class="fecha-badge fb-${c}">${fmt(r.fecha_vencimiento)}</span>
          <span class="lc-stock">${(r.total_por_lote || 0).toLocaleString('es')}</span>
          <span class="lc-stock-label">unidades</span>
        </div>
        <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="detail-panel">
        <div class="detail-title">📦 Todos los lotes — ${r.medicamento}</div>
        ${lotesHtml}
        <div class="detail-total">
          <span>TOTAL GLOBAL</span>
          <span>${totalGlobal.toLocaleString('es')}</span>
        </div>
        ${gridHtml}
      </div>
    </div>`;
  }

  wrap.innerHTML = html;
  wrap.querySelectorAll('.lote-card').forEach(card => {
    card.addEventListener('click', () => {
      const was = card.classList.contains('expanded');
      wrap.querySelectorAll('.lote-card.expanded').forEach(c => c.classList.remove('expanded'));
      if (!was) {
        card.classList.add('expanded');
        setTimeout(() => card.scrollIntoView({ behavior:'smooth', block:'nearest' }), 60);
      }
    });
  });
}

// TABS
$('tabsWrap').addEventListener('click', e => {
  const btn = e.target.closest('.tab'); if (!btn) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active'); currentTab = btn.dataset.tab; renderList();
});

// SEARCH
const si = $('searchInput'), cb = $('clearBtn');
si.addEventListener('input', () => { searchQuery = si.value.trim(); cb.style.display = searchQuery ? 'block' : 'none'; renderList(); });
cb.addEventListener('click', () => { si.value = ''; searchQuery = ''; cb.style.display = 'none'; renderList(); });

// LOAD DATA
async function loadData() {
  try {
    const res = await fetch('farmacheck.json?v=' + Date.now());
    allData = await res.json();
    byCode = buildByCode(allData);
    const now = new Date();
    $('updateTime').textContent = 'Act: ' + now.toLocaleDateString('es', { day:'2-digit', month:'2-digit', year:'2-digit' });
    $('totalMeds').textContent = Object.keys(byCode).length + ' med · ' + allData.filter(r => r.fecha_vencimiento).length + ' lotes';
    renderStats();
    renderList();
  } catch(e) {
    $('listWrap').innerHTML = `<div class="empty-state"><div class="eicon">⚠️</div><p>Error al cargar datos.<br>Verificá la conexión.</p></div>`;
  }
}

// SERVICE WORKER
if ('serviceWorker' in navigator)
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
</script>
